name: Refresh Signal Data

on:
  schedule:
    - cron: "30 3 * * 1-6"
    - cron: "0 10 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install --quiet requests
      - name: Fetch
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_signal.py
      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/macro.json
          git diff --cached --quiet || git commit -m "data: signal refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
